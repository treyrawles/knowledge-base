let _activeTheme = null;
let _searchQuery = '';
let _visibleCount = 0;
const PAGE_SIZE = 30;
let _page = 1;

// ── Build topic grid ──
function buildTopicGrid() {
  const grid = document.getElementById('topicGrid');
  THEMES.forEach((t, idx) => {
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.id = 'tc-' + idx;
    card.innerHTML = `<div class="topic-card-name">${t.label}</div><div class="topic-card-count">${t.ids.length} articles</div>`;
    card.onclick = () => filterByTheme(idx);
    grid.appendChild(card);
  });
}

// ── Filter by theme ──
function filterByTheme(idx) {
  _activeTheme = idx;
  _page = 1;
  document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('active'));
  const tc = document.getElementById('tc-' + idx);
  if (tc) tc.classList.add('active');
  document.getElementById('topicOverview').style.display = 'none';
  const t = THEMES[idx];
  document.getElementById('filterLabel').textContent = t.label;
  document.getElementById('filterCount').textContent = `(${t.ids.length} articles)`;
  document.getElementById('filterBar').style.display = 'flex';
  // Update URL hash
  window.location.hash = 'topic=' + encodeURIComponent(t.label.toLowerCase().replace(/\s+/g, '-'));
  renderArticles();
}

// ── Filter by topic pill ──
function filterByTopic(label) {
  const idx = THEMES.findIndex(t => t.label.toLowerCase() === label.toLowerCase());
  if (idx >= 0) filterByTheme(idx);
}

// ── Clear filter ──
function clearFilter() {
  _activeTheme = null;
  _page = 1;
  document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('active'));
  document.getElementById('topicOverview').style.display = '';
  document.getElementById('filterBar').style.display = 'none';
  window.location.hash = '';
  renderArticles();
}

function clearSearch() {
  document.getElementById('searchBox').value = '';
  _searchQuery = '';
  renderArticles();
}

// ── Get filtered articles ──
function getFiltered() {
  let list = ARTICLES;
  if (_activeTheme !== null) {
    const ids = new Set(THEMES[_activeTheme].ids);
    list = list.filter(a => ids.has(a.id));
  }
  if (_searchQuery) {
    const q = _searchQuery.toLowerCase();
    list = list.filter(a =>
      a.title.toLowerCase().includes(q) ||
      a.summary.toLowerCase().includes(q) ||
      a.topics.some(t => t.toLowerCase().includes(q))
    );
  }
  return list;
}

// ── Render articles ──
function renderArticles() {
  const filtered = getFiltered();
  const toShow = filtered.slice(0, _page * PAGE_SIZE);
  const container = document.getElementById('articleList');
  container.innerHTML = '';

  document.getElementById('visibleCount').textContent = filtered.length;
  document.getElementById('noResults').style.display = filtered.length === 0 ? 'block' : 'none';
  document.getElementById('loadMoreWrap').style.display = filtered.length > toShow.length ? 'block' : 'none';

  toShow.forEach(a => {
    const card = document.createElement('div');
    card.className = 'art-card';
    card.id = 'art-' + a.id;

    const topicPills = a.topics.map(t =>
      `<span class="topic-pill" onclick="event.stopPropagation();filterByTopic('${t.replace(/'/g, "\'")}')">${escHtml(t)}</span>`
    ).join('');

    card.innerHTML = `
      <div class="art-head" onclick="toggleCard(${a.id})">
        <div>
          <div class="art-title">
            <a href="${escHtml(a.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escHtml(a.title)}</a>
          </div>
          <div class="art-meta">
            <span class="date">${escHtml(a.date)}</span>
            <span>${a.topics.length} topics</span>
          </div>
          <div class="topic-pills">${topicPills}</div>
        </div>
      </div>
      <div class="art-summary">
        <p>${escHtml(a.summary)}</p>
        <a href="${escHtml(a.url)}" target="_blank" rel="noopener" class="art-link">Read full article →</a>
      </div>
    `;
    container.appendChild(card);
  });
}

function toggleCard(id) {
  const card = document.getElementById('art-' + id);
  if (card) card.classList.toggle('expanded');
}

function loadMore() {
  _page++;
  renderArticles();
  // Scroll to newly loaded content
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Search ──
let _searchTimer = null;
document.getElementById('searchBox').addEventListener('input', function() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    _searchQuery = this.value.trim();
    _page = 1;
    if (_searchQuery) {
      _activeTheme = null;
      document.getElementById('topicOverview').style.display = 'none';
      document.getElementById('filterBar').style.display = 'none';
    } else if (_activeTheme === null) {
      document.getElementById('topicOverview').style.display = '';
    }
    renderArticles();
  }, 200);
});

// ── Back to top ──
window.addEventListener('scroll', () => {
  const btn = document.getElementById('backTop');
  btn.classList.toggle('visible', window.scrollY > 400);
});

// ── Hash routing ──
function handleHash() {
  const hash = window.location.hash.replace('#', '');
  if (hash.startsWith('topic=')) {
    const slug = decodeURIComponent(hash.replace('topic=', ''));
    const idx = THEMES.findIndex(t => t.label.toLowerCase().replace(/\s+/g, '-') === slug);
    if (idx >= 0) {
      filterByTheme(idx);
      return;
    }
  }
  clearFilter();
}

// ── Init ──
buildTopicGrid();
renderArticles();
handleHash();
window.addEventListener('hashchange', handleHash);
</script>
